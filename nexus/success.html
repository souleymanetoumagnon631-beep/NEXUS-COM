<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Paiement confirmé</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124, 111, 255, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201, 168, 76, 0.06) 0%, transparent 55%);
    }

    .wrap {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c6fff, #a78bfa, #c9a84c);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(124, 111, 255, 0.4);
    }

    .logo-name {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .08em;
      background: linear-gradient(135deg, #fff 20%, #a78bfa 60%, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 111, 255, 0.5), transparent);
    }

    /* ── État : vérification ── */
    .spinner-ring {
      width: 64px;
      height: 64px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 28px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── État : succès ── */
    .success-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, var(--green-d), var(--green));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 30px rgba(52, 211, 153, 0.4);
      animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── État : erreur ── */
    .error-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, var(--red-d), var(--red));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 30px rgba(248, 113, 113, 0.4);
    }

    .title {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -.01em;
    }

    .sub {
      font-size: .9rem;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .detail-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 28px;
      text-align: left;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      font-size: .84rem;
    }

    .detail-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .detail-label {
      color: var(--text3);
    }

    .detail-val {
      font-weight: 700;
      color: var(--text);
    }

    .detail-val.accent {
      color: var(--accent2);
    }

    .btn-main {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c6fff, #8b5cf6);
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124, 111, 255, 0.4);
      transition: all .25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124, 111, 255, 0.55);
    }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: var(--surface2);
      color: var(--text);
      font-size: .9rem;
      font-weight: 600;
      border: 1px solid var(--border2);
      border-radius: 11px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-secondary:hover {
      background: var(--surface3);
    }

    .progress-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border2);
      animation: dotPulse 1.4s ease infinite;
    }

    .dot:nth-child(2) {
      animation-delay: .2s;
    }

    .dot:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes dotPulse {

      0%,
      100% {
        opacity: .3;
        transform: scale(.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
        background: var(--accent);
      }
    }

    .help-link {
      margin-top: 24px;
      font-size: .78rem;
      color: var(--text3);
    }

    .help-link a {
      color: var(--accent2);
      text-decoration: none;
    }

    .help-link a:hover {
      text-decoration: underline;
    }

    /* ── P9: Mobile fixes pour success page ── */
    @media(max-width: 500px) {
      .wrap {
        padding: 16px;
      }

      .card {
        padding: 28px 20px !important;
      }

      .card .title {
        font-size: 1.1rem !important;
      }

      .card .sub {
        font-size: .82rem !important;
      }

      .detail-box {
        padding: 12px 14px !important;
      }

      .detail-row {
        font-size: .78rem !important;
        flex-wrap: wrap;
        gap: 4px;
      }

      .success-icon,
      .error-icon {
        width: 60px !important;
        height: 60px !important;
        margin-bottom: 20px !important;
      }

      .success-icon svg,
      .error-icon svg {
        width: 28px !important;
        height: 28px !important;
      }

      .spinner-ring {
        width: 48px !important;
        height: 48px !important;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
      </div>
      <div class="logo-name">NEXUS</div>
    </div>

    <div class="card" id="card">
      <!-- État : vérification (par défaut) -->
      <div class="spinner-ring"></div>
      <div class="title">Vérification du paiement...</div>
      <div class="sub">
        Nous confirmons votre transaction auprès de PayTech.<br>
        Cela prend généralement quelques secondes.
      </div>
      <div class="progress-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="help-link">
      Un souci ? <a href="mailto:support@nexus-app.com">Contactez le support</a>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/paytech.js"></script>
  <script>
    // ══════════════════════════════════════════
    //   SUCCESS PAGE — Vérification abonnement
    // ══════════════════════════════════════════

    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const plan = params.get('plan');
      const ref = params.get('ref');

      // ── Vérifier qu'une session existe ──
      const session = await Auth.getSession();

      if (!session) {
        // Le paiement a été fait pendant l'inscription : on doit se reconnecter
        // après que le webhook ait traité le compte. On retente quelques fois.
        showWaitingForAccount(plan, ref);
        return;
      }

      // ── Session active : vérifier que l'abonnement a bien été activé ──
      showVerifying();

      const sub = await PayTech.checkSubscriptionActivated(10, 2000);

      if (sub) {
        showSuccess(sub, plan);
      } else {
        showPending(plan, ref);
      }
    })();

    // ══════════════════════════════════════════
    //   ÉTATS UI
    // ══════════════════════════════════════════

    function showVerifying() {
      $('card').innerHTML = `
    <div class="spinner-ring"></div>
    <div class="title">Vérification du paiement...</div>
    <div class="sub">
      Nous confirmons votre transaction auprès de PayTech.<br>
      Cela prend généralement quelques secondes.
    </div>
    <div class="progress-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
    }

    function showWaitingForAccount(plan, ref) {
      $('card').innerHTML = `
    <div class="spinner-ring"></div>
    <div class="title">Activation de votre compte...</div>
    <div class="sub">
      Votre paiement a été reçu. Nous activons votre compte NEXUS.<br>
      Vous allez être redirigé vers la connexion.
    </div>
    <div class="progress-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;

      // Le webhook PayTech crée/active le compte côté serveur.
      // On redirige vers login après un court délai pour laisser le temps au webhook.
      setTimeout(() => {
        sessionStorage.setItem('nexus_msg', 'Paiement confirmé ! Connectez-vous pour accéder à NEXUS.');
        window.location.href = `login.html${ref ? '?ref=' + ref : ''}`;
      }, 4000);
    }

    function showSuccess(sub, plan) {
      const planConfig = NEXUS.plans[sub.plan] || NEXUS.plans[plan] || {};

      $('card').innerHTML = `
    <div class="success-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="title">Paiement confirmé ! 🎉</div>
    <div class="sub">
      Votre abonnement NEXUS est maintenant actif.<br>
      Bienvenue dans votre espace de gestion commerciale.
    </div>
    <div class="detail-box">
      <div class="detail-row">
        <span class="detail-label">Plan</span>
        <span class="detail-val">${planConfig.name || sub.plan}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Montant</span>
        <span class="detail-val accent">${planConfig.label || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Statut</span>
        <span class="detail-val" style="color:var(--green)">Actif ✓</span>
      </div>
    </div>
    <button class="btn-main" onclick="window.location.href='dashboard.html'">
      Accéder à mon tableau de bord
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>`;
    }

    function showPending(plan, ref) {
      $('card').innerHTML = `
    <div class="success-icon" style="background:linear-gradient(135deg,#fbbf24,#f59e0b)">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <div class="title">Paiement en cours de traitement</div>
    <div class="sub">
      Votre transaction a bien été reçue par PayTech, mais l'activation prend un peu plus de temps que prévu.<br>
      Votre abonnement sera actif dans quelques minutes.
    </div>
    <div class="detail-box">
      ${ref ? `<div class="detail-row"><span class="detail-label">Référence</span><span class="detail-val" style="font-size:.76rem">${esc(ref)}</span></div>` : ''}
      <div class="detail-row">
        <span class="detail-label">Statut</span>
        <span class="detail-val" style="color:var(--yellow)">En attente</span>
      </div>
    </div>
    <button class="btn-main" onclick="retryCheck()">
      Vérifier à nouveau
    </button>
    <button class="btn-secondary" onclick="window.location.href='dashboard.html'">
      Continuer vers le tableau de bord
    </button>`;
    }

    function showError(message) {
      $('card').innerHTML = `
    <div class="error-icon">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <div class="title">Une erreur est survenue</div>
    <div class="sub">${esc(message || 'Impossible de vérifier votre paiement pour le moment.')}</div>
    <button class="btn-main" onclick="window.location.reload()">Réessayer</button>
    <button class="btn-secondary" onclick="window.location.href='login.html'">Retour à la connexion</button>`;
    }

    async function retryCheck() {
      showVerifying();
      const sub = await PayTech.checkSubscriptionActivated(6, 2000);
      if (sub) {
        showSuccess(sub);
      } else {
        showPending();
      }
    }

    function $(id) { return document.getElementById(id); }
    function esc(s) {
      return (s || '').replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"');
    }
  </script>

</body>

</html>
